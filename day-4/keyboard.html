<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><i class="fas fa-keyboard    "></i></title>

<style>
*{
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:rgb(255, 210, 168);
}

h1{
    text-align:center;
}

#container{
    width:100%;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.row{
    display:flex;
    justify-content:center;
    gap:12px;
}

.key{
    width:80px;
    height:80px;
    background:#ffdada;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    box-shadow:0 8px 18px rgba(0,0,0,.35);
}


.esc{
    width:90px;
}

.func{
    width:90px;
}

.insert{
    width:90px;
}

.prtsc{
    width:120px;
}

.delete{
    width:90px;
}

.backspace{
    width:220px;
}

.tab{
    width:170px;
}

.caps{
    width:170px;
}

.enter{
    width:170px;
}

.shift{
    width:210px;
}

.space{
    width:620px;
}

.small{
    width:85px;
}

.arrow{
    width:80px;
}

</style>

</head>
<body>

<h1>KEYBOARD</h1>

<div id="container">

    <div class="row">
        <div class="key esc">Esc</div>

        <div class="key func">F1</div>
        <div class="key func">F2</div>
        <div class="key func">F3</div>
        <div class="key func">F4</div>
        <div class="key func">F5</div>
        <div class="key func">F6</div>
        <div class="key func">F7</div>
        <div class="key func">F8</div>
        <div class="key func">F9</div>
        <div class="key func">F10</div>
        <div class="key func">F11</div>
        <div class="key func">F12</div>

        <div class="key insert">Insert</div>
        <div class="key prtsc">PrintScr</div>
        <div class="key delete">Delete</div>
    </div>

    <div class="row">
        <div class="key">~</div>
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key">0</div>
        <div class="key">-</div>
        <div class="key">=</div>

        <div class="key backspace">Backspace</div>

        <div class="key">Home</div>
    </div>

    <div class="row">
        <div class="key tab">Tab</div>

        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
        <div class="key">{</div>
        <div class="key">}</div>
        <div class="key">\</div>

        <div class="key">Pg Up</div>
    </div>

    <div class="row">
        <div class="key caps">Caps Lock</div>

        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
        <div class="key">;</div>
        <div class="key">'</div>

        <div class="key enter">Enter</div>

        <div class="key">Pg Dn</div>
    </div>

    <div class="row">
        <div class="key shift">Shift</div>

        <div class="key">Z</div>
        <div class="key">X</div>
        <div class="key">C</div>
        <div class="key">V</div>
        <div class="key">B</div>
        <div class="key">N</div>
        <div class="key">M</div>
        <div class="key">&lt;</div>
        <div class="key">&gt;</div>
        <div class="key">?</div>

        <div class="key shift">Shift</div>

        <div class="key arrow">↑</div>

        <div class="key">End</div>
    </div>

    <div class="row">

        <div class="key small">Ctrl</div>
        <div class="key small">Fn</div>
        <div class="key small">Win</div>
        <div class="key small">Alt</div>

        <div class="key space">Space</div>

        <div class="key small">Alt</div>
        <div class="key small">Fn</div>
        <div class="key small">Ctrl</div>

        <div class="key arrow">←</div>
        <div class="key arrow">↓</div>
        <div class="key arrow">→</div>

    </div>

</div>

</body>
</html>
